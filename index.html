<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Nomadic Almanac — World Travel Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── Top Bar ──────────────────────────────────────────────────────────────── -->
<div id="topbar">

  <!-- Row 1: Logo · Months · Search -->
  <div id="tb-row1">

    <div id="logo">
      <svg id="logo-icon" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="27" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
        <line x1="28" y1="1"  x2="28" y2="7"  stroke="#c9a84c" stroke-width="1.4"/>
        <line x1="28" y1="49" x2="28" y2="55" stroke="#c9a84c" stroke-width="1.4"/>
        <line x1="1"  y1="28" x2="7"  y2="28" stroke="#c9a84c" stroke-width="1.4"/>
        <line x1="49" y1="28" x2="55" y2="28" stroke="#c9a84c" stroke-width="1.4"/>
        <line x1="8.1"  y1="8.1"  x2="11.9" y2="11.9" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>
        <line x1="47.9" y1="8.1"  x2="44.1" y2="11.9" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>
        <line x1="8.1"  y1="47.9" x2="11.9" y2="44.1" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>
        <line x1="47.9" y1="47.9" x2="44.1" y2="44.1" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>
        <circle cx="28" cy="28" r="25" fill="#100c05" stroke="#c9a84c" stroke-width="1.6"/>
        <circle cx="28" cy="28" r="20" fill="none" stroke="#c9a84c" stroke-width="0.4" opacity="0.3"/>
        <circle cx="28" cy="28" r="13" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.28"/>
        <circle cx="28" cy="28" r="6"  fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.35"/>
        <polygon points="28,3 31.5,21 28,18 24.5,21" fill="#e8d5a3"/>
        <polygon points="28,3 29.5,13 28,15 26.5,13" fill="#9b1c2e"/>
        <polygon points="28,53 31,36 28,39 25,36" fill="#c9a84c" opacity="0.45"/>
        <polygon points="53,28 36,31 39,28 36,25" fill="#c9a84c" opacity="0.55"/>
        <polygon points="3,28 20,31 17,28 20,25" fill="#c9a84c" opacity="0.55"/>
        <polygon points="47,9  35,22 31,18" fill="#e8d5a3" opacity="0.5"/>
        <polygon points="9,9   21,22 25,18" fill="#e8d5a3" opacity="0.5"/>
        <polygon points="47,47 35,34 31,38" fill="#c9a84c" opacity="0.32"/>
        <polygon points="9,47  21,34 25,38" fill="#c9a84c" opacity="0.32"/>
        <polygon points="19,6  15,14 13,11" fill="#c9a84c" opacity="0.26"/>
        <polygon points="37,6  41,14 43,11" fill="#c9a84c" opacity="0.26"/>
        <polygon points="50,19 42,23 43,20" fill="#c9a84c" opacity="0.26"/>
        <polygon points="50,37 42,33 43,36" fill="#c9a84c" opacity="0.22"/>
        <polygon points="37,50 41,42 43,45" fill="#c9a84c" opacity="0.22"/>
        <polygon points="19,50 15,42 13,45" fill="#c9a84c" opacity="0.22"/>
        <polygon points="6,37  14,33 11,36" fill="#c9a84c" opacity="0.22"/>
        <polygon points="6,19  14,23 11,20" fill="#c9a84c" opacity="0.26"/>
        <text x="28" y="19" text-anchor="middle" dominant-baseline="middle"
          font-family="IBM Plex Mono,monospace" font-size="5.5" font-weight="700"
          fill="#e8d5a3" opacity="0.85">N</text>
        <circle cx="28" cy="28" r="5"   fill="#100c05" stroke="#c9a84c" stroke-width="1.4"/>
        <circle cx="28" cy="28" r="2.8" fill="none"   stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
        <circle cx="28" cy="28" r="1.5" fill="#c9a84c"/>
      </svg>
      <div id="logo-text">
        <div id="logo-wordmark">
          <span id="logo-nomadic">NOMADIC</span><span id="logo-almanac">ALMANAC</span>
        </div>
        <div id="logo-sub">WORLD TRAVEL INTELLIGENCE &middot; EST.&nbsp;2025</div>
      </div>
    </div>

    <!-- Month selector — always visible -->
    <div id="months-row">
      <div id="months"></div>
    </div>

    <!-- Inline search -->
    <div id="search-wrap">
      <input id="country-search" type="text" placeholder="&#128269; Search&hellip;" autocomplete="off" spellcheck="false" />
      <div id="search-results"></div>
    </div>

  </div><!-- /tb-row1 -->

  <!-- Row 2: Data layers · Transport · Passport selector -->
  <div id="tb-row2">
    <div id="layers"></div>
    <div class="tb-div"></div>
    <div id="transport"></div>
    <div class="tb-div"></div>
    <div id="passport-wrap">
      <select id="passport-select" title="Select your passport for visa information">
        <option value="">🛂 Passport&hellip;</option>
      </select>
    </div>
  </div><!-- /tb-row2 -->

</div><!-- /topbar -->

<!-- Map -->
<div id="map"></div>

<!-- Best destinations panel -->
<div id="best-panel" style="display:none">
  <div id="best-panel-header">Best This Month</div>
  <ol id="best-panel-list"></ol>
</div>

<!-- Loading status indicator (shown during async GeoJSON fetches) -->
<div id="map-status"></div>

<!-- Info tooltip (shown on click) -->
<div id="tt">
  <div class="tth">
    <h3 id="tt-name"></h3>
    <div class="ts" id="tt-sub"></div>
    <div class="tm" id="tt-period"></div>
  </div>
  <div class="ttb" id="tt-body"></div>
</div>

<!-- Legend -->
<div id="legend">
  <h4>FIELD GUIDE</h4>
  <div id="legend-body"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
